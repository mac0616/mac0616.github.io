---
layout: default
---
<div class="header">
  <h1>Tech Blog</h1>
  <p>개발 경험과 문제 해결 과정을 기록합니다.</p>
</div>

<section class="posts">
  {% for post in site.posts %}
    <article class="post">
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      <p>{{ post.excerpt | strip_html | truncate: 150 }}</p>
      <div class="date">{{ post.date | date: "%Y-%m-%d" }}</div>
    </article>
  {% endfor %}
</section>
